<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rink Lab — Stats</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Stats page layout ── */
    .stats-page {
      max-width: 860px;
      margin:    0 auto;
      padding:   48px 24px 64px;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display:               grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap:                   20px;
    }

    .stat-card {
      position:   relative;
      background: var(--panel);
      border:     1px solid var(--border);
      border-radius: 12px;
      padding:    36px 32px 32px;
      overflow:   hidden;
      transition: border-color .25s, transform .2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-3px); }

    /* Glow blob */
    .stat-card::before {
      content:       '';
      position:      absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background:    var(--card-glow, var(--accent));
      border-radius: 50%;
      opacity:       .07;
      pointer-events: none;
      transition:    opacity .3s;
    }
    .stat-card:hover::before { opacity: .13; }

    .stat-icon   { font-size: 28px; margin-bottom: 18px; display: block; }
    .stat-label  { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .stat-number {
      font-size:            clamp(48px, 8vw, 72px);
      font-weight:          800;
      line-height:          1;
      color:                var(--text);
      font-variant-numeric: tabular-nums;
      transition:           color .3s;
    }
    .stat-card:hover .stat-number { color: var(--accent); }
    .stat-sub { margin-top: 12px; font-size: 13px; color: var(--muted); }

    /* Loading shimmer */
    .stat-number.loading {
      background:             linear-gradient(90deg, var(--border) 25%, var(--hover) 50%, var(--border) 75%);
      background-size:        200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip:        text;
      animation:              shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .stat-number.error { font-size: 24px; color: #e05a5a; font-weight: 400; padding-top: 16px; }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-number.done { animation: countUp .4s ease both; }

    .last-updated { text-align: center; margin-top: 36px; font-size: 11px; color: var(--muted); letter-spacing: .06em; }
  </style>
</head>
<body class="scroll-layout">

  <!-- ── Hero banner ── -->
  <div id="hero-banner">
    <div id="hero-banner-overlay"></div>
    <div id="hero-banner-content">
      <div id="hero-banner-title">RINK <span>LABS</span></div>
      <div id="hero-banner-sub">By the Numbers</div>
      <a id="hero-banner-cta" href="index.html">Back To Labs →</a>
    </div>
  </div>

  <div class="stats-page">
    <div class="stat-grid">

      <div class="stat-card" style="--card-glow:#5567b0;">
        <span class="stat-icon">🧑‍💼</span>
        <div class="stat-label">Coaches Signed Up</div>
        <div class="stat-number loading" id="stat-coaches">—</div>
        <div class="stat-sub">Volunteer coaches across all teams</div>
      </div>

      <div class="stat-card" style="--card-glow:var(--accent);">
        <span class="stat-icon">🎯</span>
        <div class="stat-label">Drills Created</div>
        <div class="stat-number loading" id="stat-drills">—</div>
        <div class="stat-sub">Saved drills in the lab</div>
      </div>

    </div>
    <div class="last-updated" id="last-updated"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    function animateCount(el, target, duration = 900) {
      el.classList.remove('loading');
      if (target === 0) { el.textContent = '0'; el.classList.add('done'); return; }
      const start = performance.now();
      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased    = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(target * eased).toLocaleString();
        if (progress < 1) requestAnimationFrame(tick);
        else { el.textContent = target.toLocaleString(); el.classList.add('done'); }
      }
      requestAnimationFrame(tick);
    }

    function showError(el, msg = 'Error') {
      el.classList.remove('loading');
      el.classList.add('error');
      el.textContent = msg;
    }

    async function loadStats() {
      const coachEl = document.getElementById('stat-coaches');
      const drillEl = document.getElementById('stat-drills');

      try {
        const { count, error } = await _supabase.from('drill').select('*', { count: 'exact', head: true });
        if (error) throw error;
        animateCount(drillEl, count ?? 0);
      } catch (e) { showError(drillEl, 'Unavailable'); }

      try {
        const { data, error } = await _supabase.rpc('get_coach_count');
        if (error) throw error;
        animateCount(coachEl, data ?? 0);
      } catch (e) { showError(coachEl, 'Unavailable'); }

      document.getElementById('last-updated').textContent =
        'Last refreshed ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    loadStats();
  </script>
</body>
</html>
