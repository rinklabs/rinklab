<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drill Lab Canvas</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    #coach-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    #coach-indicator strong {
      color: var(--text);
    }
    #coach-indicator a {
      color: var(--accent);
      text-decoration: underline;
      font-size: 12px;
    }
    #coach-indicator.unset strong {
      color: #f38ba8;  /* red-ish warning */
    }
  </style>
</head>
<body>

<!-- ── Top bar ───────────────────────────────────────────────── -->
<div id="top-bar">
  <a href="index.html" class="btn btn-secondary">← Hub</a>
  <span id="logo">🏒 Drill Lab Canvas</span>
  <input type="text" id="drill-title"
         placeholder="Drill Title"
         autocomplete="off"/>
  <div id="top-actions">
    <button class="btn btn-outline" id="btn-load">Load JSON</button>
    <button class="btn btn-outline"   id="btn-save">Save JSON</button> 
    <button class="btn btn-primary"   id="btn-save-local">💾 Save</button>
    <button class="btn btn-primary" id="btn-library">📂 Library</button>
  </div>
  <div id="coach-indicator">
    Saving as: <strong id="coach-indicator-name">—</strong>
  </div>

</div>

<!-- ── Main row ──────────────────────────────────────────────── -->
<div id="main-row">

  <div id="canvas-wrap">
    <div id="rink-layer"></div>
    <canvas id="c"></canvas>
  </div>

  <div id="toolbar">
      <button class="btn btn-full btn-secondary" id="btn-toggle">◑ Half Rink</button>
      <button class="btn btn-full btn-danger" id="btn-clear">✕ Clear Canvas</button>
    <div id="tools">
      <button class="tool-btn active" data-tool="select"  title="Select (V)">⌖</button>
      <button class="tool-btn"        data-tool="rect"    title="Rectangle (R)">▭</button>
      <button class="tool-btn"        data-tool="ellipse" title="Ellipse (E)">◯</button>
      <button class="tool-btn tool-group-btn" id="group-btn-lines" title="Lines &amp; Pen">╱<span class="group-pip">▸</span></button>
      <button class="tool-btn"        data-tool="text"    title="Text (T)">T</button>
      <button class="tool-btn tool-group-btn" id="group-btn-equip" title="Equipment">▲<span class="group-pip">▸</span></button>
      <button class="tool-btn"        data-tool="player"  title="Place Player">🏒</button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <span class="tb-label">Player type</span>
      <select id="player-type">
        <option value="F">F</option>
        <option value="D">D</option>
        <option value="G">G</option>
        <option value="C">C</option>
        <option value="W">W</option>
        <option value="X">X</option>
        <option value="O">O</option>
      </select>
    </div>

    <div class="tb-group">
      <span class="tb-label">Player size</span>
      <select id="p-player-size">
        <option value="24">Small</option>
        <option value="32" selected>Medium</option>
        <option value="40">Large</option>
        <option value="48">X-Large</option>
      </select>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <span class="tb-label">Stroke</span>
      <input type="color" id="stroke-color" value="#000000"/>
    </div>

    <div class="tb-group">
      <span class="tb-label">Fill</span>
      <div class="tb-inline">
        <input type="color" id="fill-color" value="#000000"/>
        <input type="checkbox" id="fill-check" title="Enable fill"/>
      </div>
    </div>

    <div class="tb-group">
      <span class="tb-label">Stroke width</span>
      <input type="range" id="stroke-width" min="1" max="20" value="2" class="tb-range"/>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <span class="tb-label">Line style</span>
      <select id="line-style">
        <option value="solid">— Solid</option>
        <option value="dashed">-- Dashed</option>
        <option value="dotted">·· Dotted</option>
        <option value="wiggle">〜 Wiggle</option>
      </select>
    </div>

    <div class="tb-sep"></div>

    <button class="btn btn-danger btn-full"    id="btn-del"  title="Delete selected (Del)">✕ Delete</button>
    <button class="btn btn-secondary btn-full" id="btn-dup"  title="Duplicate selected (Ctrl+D)">⧉ Duplicate</button>
    <button class="btn btn-secondary btn-full" id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
    <button class="btn btn-secondary btn-full" id="btn-redo" title="Redo (Ctrl+Shift+Z)" disabled>↪ Redo</button>

    <div id="props">
      <div class="tb-sep" style="margin:0 -8px 6px;"></div>
      <h3>Selected</h3>
      <div class="prop-row">
        <label>Stroke</label>
        <input type="color" id="p-stroke"/>
      </div>
      <div class="prop-row" id="row-fill">
        <label>Fill</label>
        <input type="checkbox" id="p-fill-check"/>
        <input type="color" id="p-fill"/>
      </div>
      <div class="prop-row" id="row-sw">
        <label>Width</label>
        <input type="range" id="p-sw" min="1" max="20"/>
      </div>
      <div class="prop-row">
        <label>Opacity</label>
        <input type="range" id="p-opacity" min="0" max="100" value="100"/>
      </div>
      <div class="prop-row" id="row-font">
        <label>Font size</label>
        <input type="number" id="p-font" min="8" max="200" value="20"/>
      </div>
      <div class="prop-row" id="row-player-type">
        <label>Player</label>
        <select id="p-player-type">
          <option value="F">F</option>
          <option value="D">D</option>
          <option value="G">G</option>
          <option value="C">C</option>
          <option value="W">W</option>
          <option value="X">X</option>
          <option value="O">O</option>
        </select>
        <div class="prop-row" id="row-is-coach" style="display:none;">
          <label>Circle</label>
          <input type="checkbox" id="p-is-coach">
        </div>
      </div>
      <div class="prop-row" id="row-line-style">
        <label>Line style</label>
        <select id="p-line-style">
          <option value="solid">— Solid</option>
          <option value="dashed">-- Dashed</option>
          <option value="dotted">·· Dotted</option>
          <option value="wiggle">〜 Wiggle</option>
        </select>
      </div>
      <label>
        Sub
        <input id="prop-subscript" type="text" maxlength="2"
               placeholder="—" style="width:2.5em;text-align:center;"/>
      </label>
    </div>

    <div id="group-props" class="prop-group" style="display:none;">
      <span class="tb-label">Group Actions</span>
      <div class="tool-grid">
        <button class="btn btn-secondary" id="btn-group-flip-h" title="Flip Horizontal (Ctrl+H)">↔ Flip</button>
        <button class="btn btn-secondary" id="btn-group-flip-v" title="Flip Vertical (Ctrl+V)">↕ Flip</button>
        <button class="btn btn-secondary" id="btn-group-rotate" title="Rotate 90° (Ctrl+R)">↻ Rotate</button>
      </div>
    </div>

  </div><!-- /toolbar -->

</div><!-- /main-row -->

<div id="tags-row">
  <span class="tb-label">Tags</span>
  <input type="text" id="drill-tags" placeholder="breakout; forecheck; 2-on-1"/>
  <span class="meta-hint">(semicolon separated)</span>
</div>

<div id="desc-row">
  <textarea id="drill-desc"
            placeholder="Drill description — coaching points, key cues, variations…"></textarea>
</div>

<div class="tool-flyout" id="flyout-lines">
  <button class="tool-btn flyout-item" data-tool="line"  title="Line (L)">╱ <span>Line</span></button>
  <button class="tool-btn flyout-item" data-tool="arrow" title="Arrow (A)">→ <span>Arrow</span></button>
  <button class="tool-btn flyout-item" data-tool="pen"   title="Pen (P)">✏ <span>Pen</span></button>
</div>

<div class="tool-flyout" id="flyout-equip">
  <button class="tool-btn flyout-item" data-tool="pylon" title="Pylon">▲ <span>Pylon</span></button>
  <button class="tool-btn flyout-item" data-tool="net"   title="Net">🥅 <span>Net</span></button>
  <button class="tool-btn flyout-item" data-tool="puck"  title="Puck">⚫ <span>Puck</span></button>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>

<script src="js/state.js"></script>
<script src="js/toast.js"></script>
<script src="js/rink.js"></script>
<script src="js/assets.js"></script>
<script src="js/renderer.js"></script>
<script src="js/interaction.js"></script>
<script src="js/io.js"></script>
<script>
  // ── Coach indicator (read-only on this page) ───────────────
  function initCoachIndicator() {
    const name = localStorage.getItem('drillLab:coach') || '';
    const el   = document.getElementById('coach-indicator');
    const span = document.getElementById('coach-indicator-name');
    if (name) {
      span.textContent = name;
      el.classList.remove('unset');
    } else {
      span.textContent = 'Not set — click Change';
      el.classList.add('unset');
    }
  }

  window.addEventListener('DOMContentLoaded', async () => {
    initCoachIndicator();

    await initRink();
    await initAssets();
    initRenderer();
    initInteraction();
    initIO();
    requestAnimationFrame(render);

    // ── Flyout palette logic ───────────────────────────────
    const FLYOUT_MAP = {
      'group-btn-lines': { flyoutId: 'flyout-lines', tools: ['line','arrow','pen'] },
      'group-btn-equip': { flyoutId: 'flyout-equip', tools: ['pylon','net','puck'] },
    };

    let openFlyoutId = null;

    function closeFlyout() {
      if (openFlyoutId) {
        document.getElementById(openFlyoutId).classList.remove('open');
        openFlyoutId = null;
      }
    }

    function syncGroupBtns() {
      Object.entries(FLYOUT_MAP).forEach(([btnId, { tools }]) => {
        document.getElementById(btnId)
          .classList.toggle('active', tools.includes(State.tool));
      });
    }

    Object.entries(FLYOUT_MAP).forEach(([btnId, { flyoutId }]) => {
      const btn    = document.getElementById(btnId);
      const flyout = document.getElementById(flyoutId);

      btn.addEventListener('click', e => {
        e.stopPropagation();
        const alreadyOpen = openFlyoutId === flyoutId;
        closeFlyout();
        if (!alreadyOpen) {
          const rect = btn.getBoundingClientRect();
          flyout.style.top  = rect.top + 'px';
          flyout.style.left = (rect.left - flyout.offsetWidth - 6) + 'px';
          flyout.classList.add('open');
          requestAnimationFrame(() => {
            flyout.style.left = (rect.left - flyout.offsetWidth - 6) + 'px';
          });
          openFlyoutId = flyoutId;
        }
      });

      flyout.querySelectorAll('[data-tool]').forEach(subBtn => {
        subBtn.addEventListener('click', e => {
          e.stopPropagation();
          setTool(subBtn.dataset.tool);
          closeFlyout();
          syncGroupBtns();
        });
      });
    });

    document.addEventListener('click', closeFlyout);
    document.addEventListener('keydown', () => setTimeout(syncGroupBtns, 0));
    document.querySelectorAll('#tools > [data-tool]').forEach(btn =>
      btn.addEventListener('click', syncGroupBtns)
    );
  });
</script>

</body>
</html>
