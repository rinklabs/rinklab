<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drill Lab Canvas</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── Top bar: title + action buttons ──────────────────────── -->
<div id="top-bar">
  <span id="logo">🏒 Drill Lab Canvas</span>
  <input type="text" id="drill-title"
         placeholder="Drill Title"
         autocomplete="off"/>
  <div id="top-actions">
    <a href="index.html" class="btn btn-secondary">⬡ Home</a>
    <button class="btn btn-toggle" id="btn-toggle">◑ Half Rink</button>
    <button class="btn btn-secondary" id="btn-load">Load JSON</button>
    <button class="btn btn-primary"   id="btn-save">Save JSON ↓</button>
    <button class="btn btn-danger"    id="btn-clear">✕ Clear</button>
  </div>
</div>

<!-- ── Main row: canvas (left, flex) + toolbar (right, fixed) ── -->
<div id="main-row">

  <!-- Canvas area -->
  <div id="canvas-wrap">
    <div id="rink-layer"></div>
    <canvas id="c"></canvas>
  </div><!-- /canvas-wrap -->

  <!-- Right toolbar (vertical) -->
  <div id="toolbar">

    <!-- Tool buttons: 2-column grid -->
    <div id="tools">
      <button class="tool-btn active" data-tool="select"  title="Select (V)">⌖</button>
      <button class="tool-btn"        data-tool="rect"    title="Rectangle (R)">▭</button>
      <button class="tool-btn"        data-tool="ellipse" title="Ellipse (E)">◯</button>
      <button class="tool-btn"        data-tool="line"    title="Line (L)">╱</button>
      <button class="tool-btn"        data-tool="arrow"   title="Arrow (A)">→</button>
      <button class="tool-btn"        data-tool="text"    title="Text (T)">T</button>
      <button class="tool-btn"        data-tool="pen"     title="Pen (P)">✏</button>
      <button class="tool-btn"        data-tool="pylon"   title="Pylon">▲</button>
      <button class="tool-btn"        data-tool="net"     title="Net">🥅</button>
      <button class="tool-btn"        data-tool="puck"    title="Puck">⚫</button>
      <button class="tool-btn"        data-tool="player"  title="Place Player">🏒</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Player type + size -->
    <div class="tb-group">
      <span class="tb-label">Player type</span>
      <select id="player-type">
        <option value="F">F</option>
        <option value="D">D</option>
        <option value="G">G</option>
        <option value="C">C</option>
        <option value="W">W</option>
        <option value="X">X</option>
        <option value="O">O</option>
      </select>
    </div>

    <div class="tb-group">
      <span class="tb-label">Player size</span>
      <select id="p-player-size">
        <option value="24">Small</option>
        <option value="32" selected>Medium</option>
        <option value="40">Large</option>
        <option value="48">X-Large</option>
      </select>
    </div>

    <div class="tb-sep"></div>

    <!-- Stroke / fill -->
    <div class="tb-group">
      <span class="tb-label">Stroke</span>
      <input type="color" id="stroke-color" value="#000000"/>
    </div>

    <div class="tb-group">
      <span class="tb-label">Fill</span>
      <div class="tb-inline">
        <input type="color" id="fill-color" value="#000000"/>
        <input type="checkbox" id="fill-check" title="Enable fill"/>
      </div>
    </div>

    <div class="tb-group">
      <span class="tb-label">Stroke width</span>
      <input type="range" id="stroke-width" min="1" max="20" value="2" class="tb-range"/>
    </div>

    <div class="tb-sep"></div>

    <!-- Line style -->
    <div class="tb-group">
      <span class="tb-label">Line style</span>
      <select id="line-style">
        <option value="solid">— Solid</option>
        <option value="dashed">-- Dashed</option>
        <option value="dotted">·· Dotted</option>
        <option value="wiggle">〜 Wiggle</option>
      </select>
    </div>

    <div class="tb-sep"></div>

    <button class="btn btn-danger btn-full" id="btn-del"
            title="Delete selected (Del)">✕ Delete</button>

    <!-- Selected-element properties (shown only when something is selected) -->
    <div id="props">
      <div class="tb-sep" style="margin:0 -8px 6px;"></div>
      <h3>Selected</h3>
      <div class="prop-row">
        <label>Stroke</label>
        <input type="color" id="p-stroke"/>
      </div>
      <div class="prop-row" id="row-fill">
        <label>Fill</label>
        <input type="checkbox" id="p-fill-check"/>
        <input type="color" id="p-fill"/>
      </div>
      <div class="prop-row" id="row-sw">
        <label>Width</label>
        <input type="range" id="p-sw" min="1" max="20"/>
      </div>
      <div class="prop-row">
        <label>Opacity</label>
        <input type="range" id="p-opacity" min="0" max="100" value="100"/>
      </div>
      <div class="prop-row" id="row-font">
        <label>Font size</label>
        <input type="number" id="p-font" min="8" max="200" value="20"/>
      </div>
      <div class="prop-row" id="row-player-type">
        <label>Player</label>
        <select id="p-player-type">
          <option value="F">F</option>
          <option value="D">D</option>
          <option value="G">G</option>
          <option value="C">C</option>
          <option value="W">W</option>
          <option value="X">X</option>
          <option value="O">O</option>
        </select>
        <div class="prop-row" id="row-is-coach" style="display:none;">
          <label>Circle</label>
          <input type="checkbox" id="p-is-coach">
        </div>
      </div>
      <div class="prop-row" id="row-line-style">
        <label>Line style</label>
        <select id="p-line-style">
          <option value="solid">— Solid</option>
          <option value="dashed">-- Dashed</option>
          <option value="dotted">·· Dotted</option>
          <option value="wiggle">〜 Wiggle</option>
        </select>
      </div>
    </div>

  </div><!-- /toolbar -->

</div><!-- /main-row -->

<!-- ── Tags: single line under the canvas ───────────────────── -->
<div id="tags-row">
  <span class="tb-label">Tags</span>
  <input type="text" id="drill-tags"
         placeholder="breakout; forecheck; 2-on-1"/>
  <span class="meta-hint">(semicolon separated)</span>
</div>

<!-- ── Description: big box at the bottom ───────────────────── -->
<div id="desc-row">
  <textarea id="drill-desc"
            placeholder="Drill description — coaching points, key cues, variations…"></textarea>
</div>

<!-- ── Toast + hidden file input ────────────────────────────── -->
<div id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>

<!-- ── Scripts ───────────────────────────────────────────────── -->
<script src="js/state.js"></script>
<script src="js/toast.js"></script>
<script src="js/rink.js"></script>
<script src="js/assets.js"></script>
<script src="js/renderer.js"></script>
<script src="js/interaction.js"></script>
<script src="js/io.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', async () => {
    await initRink();
    await initAssets();
    initRenderer();     // ResizeObserver fires immediately + sizes canvas
    initInteraction();
    initIO();
    // rAF ensures the browser has finished layout before we paint
    requestAnimationFrame(render);
  });
</script>

</body>
</html>
