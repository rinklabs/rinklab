<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Generator | Rink Draw</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="toolbar">
    <div id="logo">⬡ PRACTICE GENERATOR</div>
    <div id="tools">
      <a href="index.html" class="btn btn-secondary">Back to Hub</a>
    </div>
  </header>

  <main style="padding: 40px; max-width: 1000px; margin: 0 auto;">
    <section style="background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 8px; text-align: center;">
      <h1 style="color: var(--accent); margin-bottom: 20px;">Automated Practice Planning</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">The Generator is currently under construction. Soon you will be able to create a practice from your saved drills along with timing.</p>
      
      <div style="display: flex; gap: 10px; justify-content: center;">
        <div style="border: 1px dashed var(--muted); padding: 20px; flex: 1; border-radius: 4px;">
          <span class="tb-label">Partially Complete Phase</span>
          <p>Backend Integration (FastAPI)</p>
        </div>
        <div style="border: 1px dashed var(--muted); padding: 20px; flex: 1; border-radius: 4px;">
          <span class="tb-label">Upcoming Feature</span>
          <p>PDF Export Engine</p>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
