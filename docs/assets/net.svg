<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 70">
  <!--
    Top-down view of a hockey net.
    The opening (goal line) runs along the top edge.
    The net curves back from the two posts.
    STROKE_COLOR = frame / post colour
    FILL_COLOR   = net interior tint
  -->

  <!-- Net interior fill -->
  <path
    d="M 18,8 L 82,8 Q 94,8 94,22 L 94,46 Q 94,62 82,62 L 50,65 Q 18,62 6,46 L 6,22 Q 6,8 18,8 Z"
    fill="FILL_COLOR"
    opacity="0.35"
    stroke="none"
  />

  <!-- Mesh lines (horizontal) -->
  <line x1="6"  y1="24" x2="94" y2="24" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>
  <line x1="6"  y1="38" x2="94" y2="38" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>
  <line x1="9"  y1="52" x2="91" y2="52" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>

  <!-- Mesh lines (vertical) -->
  <line x1="28" y1="8"  x2="22" y2="63" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="8"  x2="37" y2="65" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="8"  x2="50" y2="65" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="8"  x2="63" y2="65" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>
  <line x1="72" y1="8"  x2="78" y2="63" stroke="STROKE_COLOR" stroke-width="0.8" opacity="0.4"/>

  <!-- Net frame -->
  <path
    d="M 18,8 L 82,8 Q 94,8 94,22 L 94,46 Q 94,62 82,62 L 50,65 Q 18,62 6,46 L 6,22 Q 6,8 18,8 Z"
    fill="none"
    stroke="STROKE_COLOR"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Goal-line crossbar (front) — thick, bold -->
  <line
    x1="18" y1="8" x2="82" y2="8"
    stroke="STROKE_COLOR"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Posts (circles at ends of crossbar) -->
  <circle cx="18" cy="8" r="4" fill="STROKE_COLOR"/>
  <circle cx="82" cy="8" r="4" fill="STROKE_COLOR"/>
</svg>
