<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- Shadow / base -->
  <ellipse cx="30" cy="74" rx="22" ry="5" fill="STROKE_COLOR" opacity="0.18"/>

  <!-- Cone body -->
  <polygon
    points="30,4 54,68 6,68"
    fill="FILL_COLOR"
    stroke="STROKE_COLOR"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- White reflective band 1 (upper) -->
  <polygon
    points="22.5,30 37.5,30 41,42 19,42"
    fill="white"
    opacity="0.55"
  />

  <!-- White reflective band 2 (lower) -->
  <polygon
    points="17,52 43,52 46.5,62 13.5,62"
    fill="white"
    opacity="0.35"
  />

  <!-- Base -->
  <rect
    x="4" y="68" width="52" height="8" rx="2"
    fill="STROKE_COLOR"
    opacity="0.75"
  />
</svg>
