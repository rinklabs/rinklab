<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rink Draw</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────── -->
<div id="toolbar">
  <span id="logo">⬡ RINK DRAW</span>

  <div id="tools">
    <button class="tool-btn active" data-tool="select"  title="Select (V)">↖</button>
    <button class="tool-btn"        data-tool="rect"    title="Rectangle (R)">▭</button>
    <button class="tool-btn"        data-tool="ellipse" title="Ellipse (E)">◯</button>
    <button class="tool-btn"        data-tool="line"    title="Line (L)">╱</button>
    <button class="tool-btn"        data-tool="arrow"   title="Arrow (A)">→</button>
    <button class="tool-btn"        data-tool="text"    title="Text (T)">T</button>
    <button class="tool-btn"        data-tool="pen"     title="Pen (P)">✏</button>
    <button class="tool-btn" data-tool="pylon" title="Pylon (Y)">▲</button>
    <button class="tool-btn" data-tool="net"   title="Net (N)">🥅</button>
    <div class="sep"></div>
    <button class="tool-btn"        data-tool="player"  title="Place Player">⛹</button>
    <select id="player-type" title="Player type">
      <option value="F">F — Forward</option>
      <option value="D">D — Defence</option>
      <option value="G">G — Goalie</option>
      <option value="C">C — Centre</option>
      <option value="W">W — Wing</option>
      <option value="Co">Co — Coach</option>
    </select>
    <div class="sep"></div>
    <div class="prop-row" id="row-player-size">
      <label>Size</label>
      <select id="p-player-size">
        <option value="24">Small (24px)</option>
        <option value="32" selected>Medium (32px)</option>
        <option value="40">Large (40px)</option>
        <option value="48">Extra Large (48px)</option>
      </select>
    </div>
    <div class="sep"></div>
    <span class="tb-label">Stroke</span>
    <input type="color" id="stroke-color" value="#000000"/>
    <span class="tb-label">Fill</span>
    <input type="color" id="fill-color" value="#000000"/>
    <input type="checkbox" id="fill-check" title="Use fill" style="accent-color:var(--accent);cursor:pointer;"/>
    <span class="tb-label">W</span>
    <input type="range" id="stroke-width" min="1" max="20" value="2" style="width:60px;"/>
    <div class="sep"></div>
    <span class="tb-label">Line</span>
    <select id="line-style" title="Line style">
      <option value="solid">— Solid</option>
      <option value="dashed">-- Dashed</option>
      <option value="dotted">·· Dotted</option>
      <option value="wiggle">〜 Wiggle</option>
    </select>
    <div class="sep"></div>
    <button class="btn btn-danger" id="btn-del" title="Delete selected (Del)">✕</button>
  </div>

  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn half" id="btn-toggle">◑ Half Rink</button>
    <button class="btn btn-secondary" id="btn-load">Load JSON</button>
    <button class="btn btn-primary"   id="btn-save">Save JSON ↓</button>
  </div>
</div>

<!-- ── Canvas area ──────────────────────────────────────────── -->
<div id="canvas-wrap">

  <!-- SVG rink background (inline, no network request) -->
  <div id="rink-layer"></div>

  <!-- Transparent drawing canvas -->
  <canvas id="c"></canvas>

  <!-- Per-element properties panel -->
  <div id="props">
    <h3>Properties</h3>
    <div class="prop-row">
      <label>Stroke</label>
      <input type="color" id="p-stroke"/>
    </div>
    <div class="prop-row" id="row-fill">
      <label>Fill</label>
      <input type="checkbox" id="p-fill-check"/>
      <input type="color" id="p-fill"/>
    </div>
    <div class="prop-row" id="row-sw">
      <label>Stroke W</label>
      <input type="range" id="p-sw" min="1" max="20"/>
    </div>
    <div class="prop-row">
      <label>Opacity</label>
      <input type="range" id="p-opacity" min="0" max="100" value="100"/>
    </div>
    <div class="prop-row" id="row-font">
      <label>Font size</label>
      <input type="number" id="p-font" min="8" max="200" value="20"/>
    </div>
    <div class="prop-row" id="row-player-type">
      <label>Player</label>
      <select id="p-player-type">
        <option value="F">F — Forward</option>
        <option value="D">D — Defence</option>
        <option value="G">G — Goalie</option>
        <option value="C">C — Centre</option>
        <option value="W">W — Wing</option>
        <option value="Co">Co — Coach</option>
      </select>
    </div>
    <div class="prop-row" id="row-line-style">
      <label>Line style</label>
      <select id="p-line-style">
        <option value="solid">— Solid</option>
        <option value="dashed">-- Dashed</option>
        <option value="dotted">·· Dotted</option>
        <option value="wiggle">〜 Wiggle</option>
      </select>
    </div>
  </div>

</div>

<!-- ── Drill metadata panel ─────────────────────────────────── -->
<div id="meta-panel">
  <div class="meta-field" id="meta-field-title">
    <label>Drill Title</label>
    <input type="text" id="drill-title"
           placeholder="e.g. Breakout Forecheck 2-1-2"
           autocomplete="off"/>
  </div>
  <div class="meta-field" id="meta-field-tags">
    <label>Keywords / Tags <span class="meta-hint">(semicolon separated)</span></label>
    <input type="text" id="drill-tags"
           placeholder="e.g. breakout; forecheck; 2-on-1"/>
  </div>
  <div class="meta-field" id="meta-field-desc">
    <label>Drill Description</label>
    <textarea id="drill-desc"
              placeholder="Describe the drill, key coaching points, variations…"></textarea>
  </div>
</div>

<!-- ── Toast + hidden file input ────────────────────────────── -->
<div id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>

<!-- ── Scripts (load order matters) ─────────────────────────── -->
<script src="js/state.js"></script>
<script src="js/toast.js"></script>
<script src="js/rink.js"></script>
<script src="js/renderer.js"></script>
<script src="js/interaction.js"></script>
<script src="js/io.js"></script>
<script>
  // Entry point — initialise all modules
  window.addEventListener('DOMContentLoaded', async () => {
    // Start by loading the rink
    await initRink(); 
    
    // Once rink is in place, start everything else
    initRenderer();
    initInteraction();
    initIO();
    
    render(); // Initial draw
  });
</script>

</body>
</html>
