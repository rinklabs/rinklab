<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hockey Drill Creator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f0f;--panel:#161616;--border:#2a2a2a;--accent:#ff6b35;
  --text:#e8e8e8;--muted:#555;--hover:#222;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

#toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;gap:8px;flex-wrap:wrap;
}
#logo{font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--accent);white-space:nowrap;}
#tools{display:flex;gap:4px;align-items:center;}
.tool-btn{
  width:34px;height:34px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--text);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:.1s;
}
.tool-btn:hover{background:var(--hover);}
.tool-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.tb-label{font-size:10px;color:var(--muted);letter-spacing:.08em;white-space:nowrap;}
input[type=color]{width:34px;height:34px;border:1px solid var(--border);border-radius:4px;
  padding:2px;background:var(--panel);cursor:pointer;}
input[type=range]{width:80px;accent-color:var(--accent);}
.btn{padding:7px 14px;border:none;border-radius:4px;font-family:inherit;
  font-size:11px;font-weight:700;letter-spacing:.08em;cursor:pointer;
  text-transform:uppercase;transition:.15s;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#ff8559;}
.btn-secondary{background:transparent;color:#999;border:1px solid var(--border);}
.btn-secondary:hover{border-color:#666;color:var(--text);}
.btn-danger{background:transparent;color:#e05a5a;border:1px solid #e05a5a33;}
.btn-danger:hover{background:#e05a5a22;}
/* toggle button states */
#btn-toggle{min-width:90px;}
#btn-toggle.half{background:#5567b0;border-color:#5567b0;color:#fff;}
#btn-toggle.full{background:transparent;color:#999;border:1px solid var(--border);}
#btn-toggle.full:hover{border-color:#666;color:var(--text);}

#canvas-wrap{flex:1;position:relative;overflow:hidden;}
canvas{display:block;cursor:crosshair;position:absolute;top:0;left:0;}
canvas.cursor-select{cursor:default;}
canvas.cursor-move{cursor:move;}
canvas.cursor-text{cursor:text;}

/* SVG background layer */
#rink-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#rink-layer svg{width:100%;height:100%;}

#props{
  position:absolute;top:10px;right:10px;width:210px;
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:12px;display:none;flex-direction:column;gap:10px;z-index:50;
}
#props.visible{display:flex;}
.prop-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.prop-row label{font-size:11px;color:var(--muted);white-space:nowrap;}
.prop-row input[type=color]{width:28px;height:28px;}
.prop-row input[type=range]{width:100px;}
.prop-row input[type=number]{
  width:60px;background:var(--hover);border:1px solid var(--border);
  color:var(--text);border-radius:4px;padding:3px 6px;font-family:inherit;font-size:11px;
}
#props h3{font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}

#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--panel);border:1px solid var(--accent);color:var(--accent);
  padding:8px 20px;border-radius:4px;font-size:11px;letter-spacing:.08em;
  opacity:0;transition:.25s;z-index:999;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{border-color:#e05a5a;color:#e05a5a;}

/* ── METADATA PANEL ── */
#meta-panel{
  background:var(--panel);border-top:1px solid var(--border);
  padding:10px 16px;flex-shrink:0;display:flex;gap:12px;align-items:flex-start;
}
#meta-panel .meta-field{display:flex;flex-direction:column;gap:4px;}
#meta-panel .meta-field label{
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
}
#meta-panel input[type=text],#meta-panel textarea{
  background:var(--hover);border:1px solid var(--border);color:var(--text);
  border-radius:4px;padding:5px 8px;font-family:'Courier New',monospace;font-size:12px;
  outline:none;transition:.15s;resize:none;
}
#meta-panel input[type=text]:focus,#meta-panel textarea:focus{
  border-color:var(--accent);background:#1a1a1a;
}
#meta-field-title{flex:2;min-width:160px;}
#meta-field-title input{width:100%;}
#meta-field-tags{flex:2;min-width:160px;}
#meta-field-tags input{width:100%;}
#meta-field-desc{flex:4;min-width:200px;}
#meta-field-desc textarea{width:100%;height:48px;line-height:1.4;}
.meta-hint{font-size:9px;color:var(--muted);letter-spacing:.04em;}
</style>
</head>
<body>

<div id="toolbar">
  <span id="logo">⬡ HOCKEY DRILL CREATOR</span>

  <div id="tools">
    <button class="tool-btn active" data-tool="select" title="Select (V)">↖</button>
    <button class="tool-btn" data-tool="rect"    title="Rectangle (R)">▭</button>
    <button class="tool-btn" data-tool="ellipse" title="Ellipse (E)">◯</button> <button class="tool-btn" data-tool="line"    title="Line (L)">╱</button> <button class="tool-btn" data-tool="arrow"   title="Arrow (A)">→</button> <button class="tool-btn" data-tool="text"    title="Text (T)">T</button> <button class="tool-btn" data-tool="pen"     title="Pen (P)">✏</button> <div class="sep"></div>
    <span class="tb-label">Stroke</span>
    <input type="color" id="stroke-color" value="#e8e8e8"/>
    <span class="tb-label">Fill</span>
    <input type="color" id="fill-color" value="#ffffff"/>
    <input type="checkbox" id="fill-check" title="Use fill" style="accent-color:var(--accent);cursor:pointer;"/>
    <span class="tb-label">W</span>
    <input type="range" id="stroke-width" min="1" max="20" value="2" style="width:60px;"/>
    <div class="sep"></div>
    <button class="btn btn-danger" id="btn-del" title="Delete selected (Del)">✕</button>
  </div>

  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn btn-secondary half" id="btn-toggle">◑ Half Rink</button>
    <button class="btn btn-secondary" id="btn-load">Load JSON</button>
    <button class="btn btn-primary"   id="btn-save">Save JSON ↓</button>
  </div>
</div>

    <h3>Properties</h3>
    <div class="prop-row"><label>Stroke</label><input type="color" id="p-stroke"/></div>
    <div class="prop-row"><label>Fill</label>
      <input type="checkbox" id="p-fill-check"/>
      <input type="color" id="p-fill"/>
    </div>

    <div class="prop-row"><label>Opacity</label><input type="range" id="p-opacity" min="0" max="100" value="100"/></div>

<div id="meta-panel">
  <div class="meta-field" id="meta-field-title">
    <label>Drill Title</label>
    <input type="text" id="drill-title" placeholder="e.g. Breakout Forecheck 2-1-2" autocomplete="off"/>
  </div>
  <div class="meta-field" id="meta-field-tags">
    <label>Keywords / Tags <span class="meta-hint">(semicolon separated)</span></label>
    <input type="text" id="drill-tags" placeholder="e.g. breakout; forecheck; 2-on-1"/>
  </div>
  <div class="meta-field" id="meta-field-desc">
    <label>Drill Description</label>
    <textarea id="drill-desc" placeholder="Describe the drill, key coaching points, variations…"></textarea>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>

<script>
// ═══════════════════════════════════════════════════════
//  RINK TOGGLE  — full vs left half (clipPath on the SVG)
// ═══════════════════════════════════════════════════════
// SVG viewBox: 0 0 748.498 347.5  →  half cutoff at x = 374.249
const RINK_W = 748.498, RINK_H = 347.5, HALF_X = RINK_W / 2;
let showHalf = true;

const rinkSvg = document.querySelector('#rink-layer svg');

// Add a clipPath for the half-rink view
const defs = rinkSvg.querySelector('defs') || (() => {
  const d = document.createElementNS('http://www.w3.org/2000/svg','defs');
  rinkSvg.prepend(d); return d;
})();

const clipEl = document.createElementNS('http://www.w3.org/2000/svg','clipPath');
clipEl.setAttribute('id','halfClip');
const clipRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
clipRect.setAttribute('x','0'); clipRect.setAttribute('y','0');
clipRect.setAttribute('width', HALF_X); clipRect.setAttribute('height', RINK_H);
clipEl.appendChild(clipRect);
defs.appendChild(clipEl);

// Wrap all existing SVG children (except defs) in a group we can clip
const wrapGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
wrapGroup.setAttribute('id','rink-content');
[...rinkSvg.children].forEach(child => {
  if(child.tagName !== 'defs' && child.id !== 'namedview36') wrapGroup.appendChild(child);
});
rinkSvg.appendChild(wrapGroup);

function applyRinkView(){
  if(showHalf){
    wrapGroup.setAttribute('clip-path','url(#halfClip)');
    // Shift viewBox to show only left half, preserving aspect ratio
    rinkSvg.setAttribute('viewBox',`0 0 ${HALF_X} ${RINK_H}`);
    rinkSvg.setAttribute('preserveAspectRatio','xMinYMid meet');
  } else {
    wrapGroup.removeAttribute('clip-path');
    rinkSvg.setAttribute('viewBox',`0 0 ${RINK_W} ${RINK_H}`);
    rinkSvg.setAttribute('preserveAspectRatio','xMidYMid meet');
  }
}
applyRinkView();

document.getElementById('btn-toggle').addEventListener('click', () => {
  showHalf = !showHalf;
  const btn = document.getElementById('btn-toggle');
  if(showHalf){
    btn.textContent = '◑ Half Rink';
    btn.classList.add('half'); btn.classList.remove('full');
  } else {
    btn.textContent = '⬡ Full Rink';
    btn.classList.add('full'); btn.classList.remove('half');
  }
  applyRinkView();
});

// ═══════════════════════════════════════════════════════
//  CANVAS + DRAWING ENGINE
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

let elements  = [];
let selected  = null;
let tool      = 'select';
let drawing   = false;
let dragStart = null;
let penPoints = [];
let editingText = null;
let textCursor  = '';

let defStroke = '#e8e8e8';
let defFill   = '#ffffff';
let defFillOn = false;
let defSW     = 2;

let idCounter = 1;
const uid = () => `el-${Date.now()}-${idCounter++}`;

function resize(){
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}
new ResizeObserver(resize).observe(wrap);

// ── render ──
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const el of elements) drawEl(el, el.id === selected);
  if(editingText) drawCursor();
}

function setAlpha(hex,op){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${op/100})`;
}

function drawEl(el,sel){
  ctx.save();
  ctx.globalAlpha=el.opacity/100;
  ctx.strokeStyle=el.strokeColor||'#e8e8e8';
  ctx.lineWidth=el.strokeWidth||2;
  ctx.lineCap='round'; ctx.lineJoin='round';

  if(el.type==='rect'){
    if(el.fillColor){ctx.fillStyle=setAlpha(el.fillColor,el.opacity);ctx.fillRect(el.x,el.y,el.w,el.h);}
    ctx.strokeRect(el.x,el.y,el.w,el.h);
    if(sel)selBox(el.x,el.y,el.w,el.h);
  } else if(el.type==='ellipse'){
    const cx=el.x+el.w/2,cy=el.y+el.h/2,rx=Math.abs(el.w/2),ry=Math.abs(el.h/2);
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
    if(el.fillColor){ctx.fillStyle=setAlpha(el.fillColor,el.opacity);ctx.fill();}
    ctx.stroke(); if(sel)selBox(el.x,el.y,el.w,el.h);
  } else if(el.type==='line'){
    ctx.beginPath();ctx.moveTo(el.x,el.y);ctx.lineTo(el.x+el.w,el.y+el.h);ctx.stroke();
    if(sel){selDot(el.x,el.y);selDot(el.x+el.w,el.y+el.h);}
  } else if(el.type==='arrow'){
    const x1=el.x,y1=el.y,x2=el.x+el.w,y2=el.y+el.h;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const ang=Math.atan2(y2-y1,x2-x1),hs=Math.max(10,(el.strokeWidth||2)*3.5);
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-hs*Math.cos(ang-0.4),y2-hs*Math.sin(ang-0.4));
    ctx.lineTo(x2-hs*Math.cos(ang+0.4),y2-hs*Math.sin(ang+0.4));
    ctx.closePath();ctx.fillStyle=el.strokeColor||'#e8e8e8';ctx.fill();
    if(sel){selDot(x1,y1);selDot(x2,y2);}
  } else if(el.type==='pen'&&el.points.length>1){
    ctx.beginPath();ctx.moveTo(el.points[0][0],el.points[0][1]);
    for(let i=1;i<el.points.length;i++)ctx.lineTo(el.points[i][0],el.points[i][1]);
    ctx.stroke();
    if(sel){const bb=penBB(el.points);selBox(bb.x,bb.y,bb.w,bb.h);}
  } else if(el.type==='text'){
    ctx.font=`${el.fontSize||20}px sans-serif`;
    ctx.fillStyle=el.strokeColor||'#e8e8e8';
    const txt=el.id===editingText?.id?textCursor:(el.text||'');
    ctx.fillText(txt,el.x,el.y+el.fontSize);
    if(sel){const m=ctx.measureText(txt||' ');selBox(el.x-2,el.y,m.width+4,el.fontSize*1.4);}
  }
  ctx.restore();
}

function selBox(x,y,w,h){
  ctx.save();ctx.strokeStyle='#ff6b35';ctx.lineWidth=1.5;
  ctx.setLineDash([5,3]);ctx.strokeRect(x-4,y-4,(w||1)+8,(h||1)+8);ctx.restore();
}
function selDot(x,y){
  ctx.save();ctx.fillStyle='#ff6b35';
  ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawCursor(){
  if(!editingText)return;
  const el=elements.find(e=>e.id===editingText.id); if(!el)return;
  ctx.font=`${el.fontSize||20}px sans-serif`;
  const w=ctx.measureText(textCursor).width,x=el.x+w,y=el.y;
  ctx.save();ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+el.fontSize+4);ctx.stroke();ctx.restore();
}
function penBB(pts){
  let minX=pts[0][0],maxX=pts[0][0],minY=pts[0][1],maxY=pts[0][1];
  for(const[x,y]of pts){minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);}
  return{x:minX,y:minY,w:maxX-minX,h:maxY-minY};
}

// ── hit test ──
function hitTest(x,y){
  for(let i=elements.length-1;i>=0;i--){
    const el=elements[i];
    if(el.type==='rect'||el.type==='ellipse'){
      const x1=Math.min(el.x,el.x+el.w),y1=Math.min(el.y,el.y+el.h);
      if(x>=x1&&x<=x1+Math.abs(el.w)&&y>=y1&&y<=y1+Math.abs(el.h))return el;
    }else if(el.type==='line'||el.type==='arrow'){
      if(ptSeg(x,y,el.x,el.y,el.x+el.w,el.y+el.h)<8)return el;
    }else if(el.type==='pen'){
      const bb=penBB(el.points);
      if(x>=bb.x-8&&x<=bb.x+bb.w+8&&y>=bb.y-8&&y<=bb.y+bb.h+8)return el;
    }else if(el.type==='text'){
      ctx.font=`${el.fontSize||20}px sans-serif`;
      const w=ctx.measureText(el.text||' ').width;
      if(x>=el.x-4&&x<=el.x+w+4&&y>=el.y-4&&y<=el.y+el.fontSize*1.4+4)return el;
    }
  }
  return null;
}
function ptSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay;
  if(!dx&&!dy)return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
  return Math.hypot(px-ax-t*dx,py-ay-t*dy);
}

// ── mouse ──
let moveStart=null,moveEl=null;
canvas.addEventListener('mousedown',e=>{
  const{x,y}=pos(e);
  if(editingText){commitText();return;}
  if(tool==='select'){
    const hit=hitTest(x,y);
    if(hit){selected=hit.id;moveStart={x,y};moveEl={x:hit.x,y:hit.y};}
    else selected=null;
    updateProps();render();return;
  }
  if(tool==='text'){
    const hit=hitTest(x,y);
    if(hit&&hit.type==='text'){startEditText(hit);return;}
    const el={id:uid(),type:'text',x,y,text:'',fontSize:20,strokeColor:defStroke,opacity:100};
    elements.push(el);selected=el.id;startEditText(el);return;
  }
  drawing=true;dragStart={x,y};
  if(tool==='pen')penPoints=[[x,y]];
});
canvas.addEventListener('mousemove',e=>{
  const{x,y}=pos(e);
  if(tool==='select'&&moveStart&&selected){
    const el=elements.find(e=>e.id===selected);
    if(el){el.x=moveEl.x+(x-moveStart.x);el.y=moveEl.y+(y-moveStart.y);render();}
    return;
  }
  if(!drawing)return;
  if(tool==='pen'){penPoints.push([x,y]);renderPenPrev(penPoints);return;}
  renderPrev(dragStart,{x,y});
});
canvas.addEventListener('mouseup',e=>{
  const{x,y}=pos(e);
  moveStart=null;moveEl=null;
  if(!drawing)return;drawing=false;
  const dx=x-dragStart.x,dy=y-dragStart.y;
  if(tool==='pen'){
    if(penPoints.length>2){
      const el={id:uid(),type:'pen',points:penPoints,strokeColor:defStroke,strokeWidth:defSW,opacity:100};
      elements.push(el);selected=el.id;
    }
    penPoints=[];render();updateProps();return;
  }
  if(Math.abs(dx)<4&&Math.abs(dy)<4){render();return;}
  const el={id:uid(),type:tool,x:dragStart.x,y:dragStart.y,w:dx,h:dy,
    strokeColor:defStroke,fillColor:defFillOn?defFill:null,strokeWidth:defSW,opacity:100};
  elements.push(el);selected=el.id;render();updateProps();
});
canvas.addEventListener('dblclick',e=>{
  const{x,y}=pos(e);
  if(tool==='select'){const hit=hitTest(x,y);if(hit&&hit.type==='text')startEditText(hit);}
});
function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}

function renderPrev(a,b){
  render();
  ctx.save();ctx.strokeStyle=defStroke;ctx.lineWidth=defSW;ctx.lineCap='round';ctx.lineJoin='round';
  const dx=b.x-a.x,dy=b.y-a.y;
  if(tool==='rect'){if(defFillOn){ctx.fillStyle=defFill;ctx.fillRect(a.x,a.y,dx,dy);}ctx.strokeRect(a.x,a.y,dx,dy);}
  else if(tool==='ellipse'){ctx.beginPath();ctx.ellipse(a.x+dx/2,a.y+dy/2,Math.abs(dx/2),Math.abs(dy/2),0,0,Math.PI*2);if(defFillOn){ctx.fillStyle=defFill;ctx.fill();}ctx.stroke();}
  else if(tool==='line'){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  else if(tool==='arrow'){
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    const ang=Math.atan2(dy,dx),hs=Math.max(10,defSW*3.5);
    ctx.beginPath();ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x-hs*Math.cos(ang-0.4),b.y-hs*Math.sin(ang-0.4));
    ctx.lineTo(b.x-hs*Math.cos(ang+0.4),b.y-hs*Math.sin(ang+0.4));
    ctx.closePath();ctx.fillStyle=defStroke;ctx.fill();
  }
  ctx.restore();
}
function renderPenPrev(pts){
  render();if(pts.length<2)return;
  ctx.save();ctx.strokeStyle=defStroke;ctx.lineWidth=defSW;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();ctx.restore();
}

// ── text ──
function startEditText(el){
  selected=el.id;editingText={id:el.id};textCursor=el.text||'';
  canvas.classList.add('cursor-text');render();
}
function commitText(){
  if(!editingText)return;
  const el=elements.find(e=>e.id===editingText.id);
  if(el){el.text=textCursor;if(!el.text.trim())elements=elements.filter(e=>e.id!==el.id);}
  editingText=null;textCursor='';canvas.classList.remove('cursor-text');render();updateProps();
}
document.addEventListener('keydown',e=>{
  if(editingText){
    if(e.key==='Enter'||e.key==='Escape'){commitText();return;}
    if(e.key==='Backspace'){textCursor=textCursor.slice(0,-1);render();return;}
    if(e.key.length===1){textCursor+=e.key;render();return;}
    return;
  }
  if((e.key==='Delete'||e.key==='Backspace')&&selected){
    elements=elements.filter(el=>el.id!==selected);selected=null;updateProps();render();
  }
  const k={v:'select',r:'rect',e:'ellipse',l:'line',a:'arrow',t:'text',p:'pen'};
  if(k[e.key.toLowerCase()])setTool(k[e.key.toLowerCase()]);
});

// ── tools ──
function setTool(t){
  tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
  canvas.className=t==='select'?'cursor-select':t==='text'?'cursor-text':'';
}
document.querySelectorAll('.tool-btn').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));

// ── toolbar inputs ──
document.getElementById('stroke-color').addEventListener('input',e=>{defStroke=e.target.value;applyToSel('strokeColor',e.target.value);});
document.getElementById('fill-color').addEventListener('input',e=>{defFill=e.target.value;if(defFillOn)applyToSel('fillColor',e.target.value);});
document.getElementById('fill-check').addEventListener('change',e=>{defFillOn=e.target.checked;applyToSel('fillColor',defFillOn?defFill:null);});
document.getElementById('stroke-width').addEventListener('input',e=>{defSW=+e.target.value;applyToSel('strokeWidth',+e.target.value);});
function applyToSel(k,v){if(!selected)return;const el=elements.find(e=>e.id===selected);if(el){el[k]=v;render();}}

// ── props panel ──
function updateProps(){
  const panel=document.getElementById('props');
  if(!selected){panel.classList.remove('visible');return;}
  const el=elements.find(e=>e.id===selected);
  if(!el){panel.classList.remove('visible');return;}
  panel.classList.add('visible');
  document.getElementById('p-stroke').value=el.strokeColor||'#ffffff';
  document.getElementById('p-fill').value=el.fillColor||'#ffffff';
  document.getElementById('p-fill-check').checked=!!el.fillColor;
  document.getElementById('p-sw').value=el.strokeWidth||2;
  document.getElementById('p-opacity').value=el.opacity??100;
  document.getElementById('p-font').value=el.fontSize||20;
  document.getElementById('row-font').style.display=el.type==='text'?'flex':'none';
}
['p-stroke','p-fill','p-sw','p-opacity','p-font','p-fill-check'].forEach(id=>{
  document.getElementById(id).addEventListener('input',propChange);
  document.getElementById(id).addEventListener('change',propChange);
});
function propChange(){
  if(!selected)return;
  const el=elements.find(e=>e.id===selected);if(!el)return;
  el.strokeColor=document.getElementById('p-stroke').value;
  el.fillColor=document.getElementById('p-fill-check').checked?document.getElementById('p-fill').value:null;
  el.strokeWidth=+document.getElementById('p-sw').value;
  el.opacity=+document.getElementById('p-opacity').value;
  if(el.type==='text')el.fontSize=+document.getElementById('p-font').value;
  render();
}

document.getElementById('btn-del').addEventListener('click',()=>{
  if(selected){elements=elements.filter(e=>e.id!==selected);selected=null;updateProps();render();}
});

// ── save JSON ──
document.getElementById('btn-save').addEventListener('click',()=>{
  const title = document.getElementById('drill-title').value.trim();
  const tags  = document.getElementById('drill-tags').value
    .split(';').map(t=>t.trim()).filter(Boolean);
  const desc  = document.getElementById('drill-desc').value.trim();

  const scene={
    type:'excalidraw',version:2,source:'rink-draw',
    metadata:{
      title: title || 'Untitled Drill',
      tags,
      description: desc,
      savedAt: new Date().toISOString(),
    },
    appState:{viewBackgroundColor:'transparent',rinkView:showHalf?'half':'full'},
    elements:elements.map(el=>({
      id:el.id,
      type:el.type==='arrow'?'arrow':el.type==='pen'?'freedraw':el.type==='rect'?'rectangle':
           el.type==='ellipse'?'ellipse':el.type==='line'?'line':el.type==='text'?'text':'rectangle',
      x:el.x,y:el.y,width:el.w||0,height:el.h||0,
      strokeColor:el.strokeColor||'#e8e8e8',
      backgroundColor:el.fillColor||'transparent',
      fillStyle:el.fillColor?'solid':'hachure',
      strokeWidth:el.strokeWidth||2,roughness:1,opacity:el.opacity??100,
      angle:0,seed:Math.floor(Math.random()*100000),version:1,isDeleted:false,
      groupIds:[],boundElements:null,link:null,locked:false,
      ...(el.type==='pen'?{points:el.points.map(([x,y])=>[x-el.x,y-el.y])}:{}),
      ...(el.type==='text'?{text:el.text||'',fontSize:el.fontSize||20,fontFamily:1,textAlign:'left',verticalAlign:'top'}:{}),
      ...(el.type==='line'||el.type==='arrow'?{points:[[0,0],[el.w||0,el.h||0]]}:{}),
    })),
    files:{}
  };
  const blob=new Blob([JSON.stringify(scene,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
    // Build filename from drill title
  const slug = (title || 'untitled-drill')
    .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  Object.assign(document.createElement('a'),{href:url,download:`${slug}.json`}).click();
  URL.revokeObjectURL(url);
  toast('✓ Scene exported as JSON');
});

// ── load JSON ──
document.getElementById('btn-load').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    if(data.appState?.rinkView){
      showHalf=data.appState.rinkView==='half';
      const btn=document.getElementById('btn-toggle');
      if(showHalf){btn.textContent='◑ Half Rink';btn.classList.add('half');btn.classList.remove('full');}
      else{btn.textContent='⬡ Full Rink';btn.classList.add('full');btn.classList.remove('half');}
      applyRinkView();
    }
    // Restore metadata fields
    if(data.metadata){
      document.getElementById('drill-title').value = data.metadata.title==='Untitled Drill'?'':data.metadata.title||'';
      document.getElementById('drill-tags').value  = (data.metadata.tags||[]).join('; ');
      document.getElementById('drill-desc').value  = data.metadata.description||'';
    }
    elements=(data.elements||[]).filter(el=>!el.isDeleted).map(el=>({
      id:el.id||uid(),
      type:el.type==='rectangle'?'rect':el.type==='freedraw'?'pen':el.type==='arrow'?'arrow':
           el.type==='ellipse'?'ellipse':el.type==='line'?'line':el.type==='text'?'text':'rect',
      x:el.x,y:el.y,w:el.width||0,h:el.height||0,
      strokeColor:el.strokeColor||'#e8e8e8',
      fillColor:el.backgroundColor==='transparent'||!el.backgroundColor?null:el.backgroundColor,
      strokeWidth:el.strokeWidth||2,opacity:el.opacity??100,
      text:el.text||'',fontSize:el.fontSize||20,points:el.points||null,
    }));
    selected=null;updateProps();render();toast('✓ Scene loaded');
  }catch(err){toast('✗ Invalid JSON: '+err.message,true);}
  e.target.value='';
});

// ── toast ──
function toast(msg,err=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=err?'show err':'show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2600);
}

resize();
</script>
</body>
</html>
